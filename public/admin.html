<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Cache — Holiday Extras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --hx-purple: #542E91;
    --hx-purple-light: #6b3fb3;
    --hx-purple-dark: #3d2069;
    --hx-yellow: #FDDC06;
    --hx-yellow-light: #fff3a0;
    --hx-white: #FFFFFF;
    --hx-offwhite: #F0F0F0;
    --hx-black: #232323;
    --hx-blue: #3AA6FF;
    --hx-green: #00B0A6;
    --hx-orange: #FFB55F;
    --hx-red: #FF5F68;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--hx-offwhite); color: var(--hx-black); line-height: 1.6; }

  .top-bar { background: var(--hx-purple); padding: 16px 0; }
  .top-bar .container { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-size: 20px; font-weight: 800; color: var(--hx-white); letter-spacing: -0.3px; }
  .top-bar h1 span { color: var(--hx-yellow); }
  .top-bar .user-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,.7); }
  .top-bar .user-bar input { border: 1px solid rgba(255,255,255,.25); background: rgba(255,255,255,.1); border-radius: 6px; padding: 5px 10px; font-size: 13px; font-family: 'Nunito', sans-serif; width: 230px; color: #fff; }
  .top-bar .user-bar input::placeholder { color: rgba(255,255,255,.4); }

  .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }
  .content { padding: 24px 0 40px; }

  .btn { display: inline-flex; align-items: center; gap: 4px; padding: 7px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--hx-yellow); color: var(--hx-purple); }
  .btn-primary:hover { background: #ffe94a; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-outline { background: var(--hx-white); border: 1px solid #d1d5db; color: var(--hx-black); }
  .btn-outline:hover { background: var(--hx-offwhite); border-color: var(--hx-purple); color: var(--hx-purple); }
  .btn-danger { background: var(--hx-red); color: #fff; }
  .btn-danger:hover { background: #e84e57; }
  .btn-green { background: var(--hx-green); color: #fff; }
  .btn-green:hover { background: #009e95; }
  .btn-purple { background: var(--hx-purple); color: #fff; }
  .btn-purple:hover { background: var(--hx-purple-light); }

  .group-heading { font-size: 12px; font-weight: 800; color: var(--hx-purple); text-transform: uppercase; letter-spacing: 1px; margin: 28px 0 10px; padding-left: 2px; }
  .card { background: var(--hx-white); border: 1px solid #e0dde5; border-radius: 10px; padding: 18px; margin-bottom: 12px; border-left: 4px solid var(--hx-purple); transition: box-shadow .15s; }
  .card:hover { box-shadow: 0 2px 12px rgba(84,46,145,.08); }
  .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .card-info { flex: 1; min-width: 0; }
  .card-path { font-weight: 700; font-size: 15px; color: var(--hx-purple); word-break: break-all; }
  .card-target { font-size: 13px; color: var(--hx-blue); word-break: break-all; margin-top: 3px; }
  .card-meta { font-size: 12px; color: #888; margin-top: 5px; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .card-preview { width: 120px; height: 68px; object-fit: cover; border-radius: 6px; border: 1px solid #e0dde5; margin-top: 8px; background: var(--hx-offwhite); }

  .btn-copy { background: var(--hx-yellow); border: none; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif; color: var(--hx-purple); cursor: pointer; vertical-align: middle; margin-left: 6px; }
  .btn-copy:hover { background: #ffe94a; }
  .btn-copy.copied { background: var(--hx-green); color: #fff; }

  .history { margin-top: 14px; border-top: 2px solid var(--hx-offwhite); padding-top: 12px; }
  .history h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--hx-purple); }
  .history-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--hx-offwhite); font-size: 12px; }
  .history-item:last-child { border-bottom: none; }
  .history-url { color: #666; word-break: break-all; flex: 1; }
  .history-meta { color: #999; white-space: nowrap; }
  .history-note { color: var(--hx-orange); font-style: italic; font-weight: 600; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(35,35,35,.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--hx-white); border-radius: 14px; padding: 28px; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; border-top: 4px solid var(--hx-purple); }
  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; color: var(--hx-purple); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--hx-black); }
  .form-group input, .form-group textarea { width: 100%; border: 2px solid #e0dde5; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: 'Nunito', sans-serif; transition: border-color .15s; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--hx-purple); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group small { color: #999; font-size: 12px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--hx-green); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="top-bar">
  <div class="container">
    <h1>Image Cache <span>Admin</span></h1>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div class="user-bar">
        <span>Editing as:</span>
        <input type="email" id="userEmail" placeholder="your.name@holidayextras.com">
      </div>
      <button class="btn btn-primary" onclick="showCreateModal()">+ New Redirect</button>
    </div>
  </div>
</div>
<div class="container content">
  <div id="list"></div>
  <div class="empty hidden" id="empty">No redirects configured yet.</div>
</div>

<div class="modal-overlay hidden" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
const TOKEN = params.get('token') || '';
const BASE = location.pathname.replace(/\/admin$/, '');
const API = BASE + '/api/redirects';

function headers() {
  return { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN };
}

function getUser() {
  const el = document.getElementById('userEmail');
  const v = el.value.trim();
  if (v) localStorage.setItem('ic_user', v);
  return v || 'admin';
}

document.getElementById('userEmail').value = localStorage.getItem('ic_user') || '';

async function load() {
  const res = await fetch(API, { headers: headers() });
  if (!res.ok) { alert('Failed to load: ' + res.status); return; }
  const data = await res.json();
  render(data);
}

function render(data) {
  const list = document.getElementById('list');
  const entries = Object.entries(data);
  if (!entries.length) { list.innerHTML = ''; document.getElementById('empty').classList.remove('hidden'); return; }
  document.getElementById('empty').classList.add('hidden');

  const groups = {};
  for (const [id, r] of entries) {
    const g = r.group || 'ungrouped';
    if (!groups[g]) groups[g] = [];
    groups[g].push({ id, ...r });
  }

  let html = '';
  for (const [group, items] of Object.entries(groups).sort()) {
    html += `<div class="group-heading">${esc(group)}</div>`;
    for (const item of items) {
      html += renderCard(item);
    }
  }
  list.innerHTML = html;
}

function renderCard(item) {
  const ago = timeAgo(item.updatedAt);
  const previewUrl = item.targetUrl.match(/\.(jpg|jpeg|png|avif|webp|gif)/i)
    ? item.targetUrl + (item.targetUrl.includes('?') ? '&' : '?') + 'w=240&h=136&fit=crop'
    : '';
  return `
    <div class="card" id="card-${item.id}">
      <div class="card-row">
        <div class="card-info">
          <div class="card-path">${esc(item.path)} <button class="btn-copy" onclick="copyUrl('${esc(item.path)}')" title="Copy public URL">Copy URL</button></div>
          <div class="card-target">${esc(item.targetUrl)}</div>
          <div class="card-meta">${esc(item.description)} &middot; ${ago} by ${esc(item.updatedBy)}</div>
          ${previewUrl ? `<img class="card-preview" src="${esc(previewUrl)}" alt="preview" onerror="this.style.display='none'">` : ''}
        </div>
        <div class="card-actions">
          <button class="btn btn-sm btn-outline" onclick="showEditModal('${item.id}')">Edit</button>
          <button class="btn btn-sm btn-outline" onclick="toggleHistory('${item.id}')">History (${item.history.length})</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRedirect('${item.id}')">Delete</button>
        </div>
      </div>
      <div class="history hidden" id="history-${item.id}">
        <h4>Change History</h4>
        ${item.history.length ? item.history.map((h, i) => `
          <div class="history-item">
            <div>
              <div class="history-url">${esc(h.targetUrl)}</div>
              ${h.note ? `<div class="history-note">${esc(h.note)}</div>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="history-meta">${timeAgo(h.updatedAt)} by ${esc(h.updatedBy)}</span>
              <button class="btn btn-sm btn-green" onclick="rollback('${item.id}', ${i})">Rollback</button>
            </div>
          </div>
        `).join('') : '<div style="font-size:12px;color:#999">No previous versions.</div>'}
      </div>
    </div>`;
}

function copyUrl(path) {
  const full = location.origin + BASE + path;
  navigator.clipboard.writeText(full).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy URL'; btn.classList.remove('copied'); }, 1500);
  });
}

function toggleHistory(id) {
  const el = document.getElementById('history-' + id);
  el.classList.toggle('hidden');
}

function showCreateModal() {
  document.getElementById('modalContent').innerHTML = `
    <h2>New Redirect</h2>
    <form onsubmit="createRedirect(event)">
      <div class="form-group">
        <label>ID (slug)</label>
        <input name="id" required placeholder="e.g. parking-hero-wide">
      </div>
      <div class="form-group">
        <label>Path</label>
        <input name="path" required placeholder="e.g. /parking/hero-wide">
      </div>
      <div class="form-group">
        <label>Target URL</label>
        <input name="targetUrl" required placeholder="https://holidayextras.imgix.net/...">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input name="description" placeholder="Short description">
      </div>
      <div class="form-group">
        <label>Group</label>
        <input name="group" placeholder="e.g. parking-hero">
        <small>Redirects with the same group are displayed together.</small>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-purple">Create</button>
      </div>
    </form>`;
  document.getElementById('modal').classList.remove('hidden');
}

function showEditModal(id) {
  fetch(API + '/' + id, { headers: headers() }).then(r => r.json()).then(item => {
    document.getElementById('modalContent').innerHTML = `
      <h2>Edit: ${esc(item.path)}</h2>
      <form onsubmit="updateRedirect(event, '${id}')">
        <div class="form-group">
          <label>Target URL</label>
          <input name="targetUrl" required value="${esc(item.targetUrl)}">
        </div>
        <div class="form-group">
          <label>Description</label>
          <input name="description" value="${esc(item.description)}">
        </div>
        <div class="form-group">
          <label>Note (reason for change)</label>
          <textarea name="note" placeholder="e.g. Updated for summer campaign"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-purple">Save</button>
        </div>
      </form>`;
    document.getElementById('modal').classList.remove('hidden');
  });
}

async function createRedirect(e) {
  e.preventDefault();
  const f = new FormData(e.target);
  const body = { id: f.get('id'), path: f.get('path'), targetUrl: f.get('targetUrl'), description: f.get('description'), group: f.get('group'), user: getUser() };
  const res = await fetch(API, { method: 'POST', headers: headers(), body: JSON.stringify(body) });
  if (!res.ok) { const err = await res.json(); alert(err.error); return; }
  closeModal();
  toast('Redirect created');
  load();
}

async function updateRedirect(e, id) {
  e.preventDefault();
  const f = new FormData(e.target);
  const body = { targetUrl: f.get('targetUrl'), description: f.get('description'), note: f.get('note'), user: getUser() };
  const res = await fetch(API + '/' + id, { method: 'PUT', headers: headers(), body: JSON.stringify(body) });
  if (!res.ok) { const err = await res.json(); alert(err.error); return; }
  closeModal();
  toast('Redirect updated');
  load();
}

async function rollback(id, index) {
  if (!confirm('Roll back to this version?')) return;
  const res = await fetch(API + '/' + id + '/rollback/' + index, {
    method: 'POST', headers: headers(), body: JSON.stringify({ user: getUser() })
  });
  if (!res.ok) { alert('Rollback failed'); return; }
  toast('Rolled back');
  load();
}

async function deleteRedirect(id) {
  if (!confirm('Delete this redirect? This cannot be undone.')) return;
  await fetch(API + '/' + id, { method: 'DELETE', headers: headers() });
  toast('Deleted');
  load();
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function timeAgo(iso) {
  if (!iso) return 'never';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

load();
</script>
</body>
</html>
