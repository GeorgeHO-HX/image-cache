<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Cache Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #222; line-height: 1.5; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  header h1 { font-size: 22px; font-weight: 600; }
  .user-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; }
  .user-bar input { border: 1px solid #ccc; border-radius: 4px; padding: 4px 8px; font-size: 13px; width: 220px; }
  .btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
  .btn-outline:hover { background: #f3f4f6; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-green { background: #16a34a; color: #fff; }
  .btn-green:hover { background: #15803d; }

  .group-heading { font-size: 14px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; margin: 24px 0 8px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .card-info { flex: 1; min-width: 0; }
  .card-path { font-weight: 600; font-size: 15px; color: #111; word-break: break-all; }
  .card-target { font-size: 13px; color: #2563eb; word-break: break-all; margin-top: 2px; }
  .card-meta { font-size: 12px; color: #9ca3af; margin-top: 4px; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .card-preview { width: 120px; height: 68px; object-fit: cover; border-radius: 4px; border: 1px solid #e5e7eb; margin-top: 8px; background: #f9fafb; }

  .history { margin-top: 12px; border-top: 1px solid #e5e7eb; padding-top: 12px; }
  .history h4 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .history-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
  .history-item:last-child { border-bottom: none; }
  .history-url { color: #6b7280; word-break: break-all; flex: 1; }
  .history-meta { color: #9ca3af; white-space: nowrap; }
  .history-note { color: #9ca3af; font-style: italic; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .form-group input, .form-group textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 10px; font-size: 14px; font-family: inherit; }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group small { color: #9ca3af; font-size: 12px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: #16a34a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; padding: 40px; color: #9ca3af; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Image Cache Admin</h1>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div class="user-bar">
        <span>Editing as:</span>
        <input type="email" id="userEmail" placeholder="your.name@holidayextras.com">
      </div>
      <button class="btn btn-primary" onclick="showCreateModal()">+ New Redirect</button>
    </div>
  </header>
  <div id="list"></div>
  <div class="empty hidden" id="empty">No redirects configured yet.</div>
</div>

<div class="modal-overlay hidden" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
const TOKEN = params.get('token') || '';
const API = '/api/redirects';

function headers() {
  return { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN };
}

function getUser() {
  const el = document.getElementById('userEmail');
  const v = el.value.trim();
  if (v) localStorage.setItem('ic_user', v);
  return v || 'admin';
}

document.getElementById('userEmail').value = localStorage.getItem('ic_user') || '';

async function load() {
  const res = await fetch(API, { headers: headers() });
  if (!res.ok) { alert('Failed to load: ' + res.status); return; }
  const data = await res.json();
  render(data);
}

function render(data) {
  const list = document.getElementById('list');
  const entries = Object.entries(data);
  if (!entries.length) { list.innerHTML = ''; document.getElementById('empty').classList.remove('hidden'); return; }
  document.getElementById('empty').classList.add('hidden');

  const groups = {};
  for (const [id, r] of entries) {
    const g = r.group || 'ungrouped';
    if (!groups[g]) groups[g] = [];
    groups[g].push({ id, ...r });
  }

  let html = '';
  for (const [group, items] of Object.entries(groups).sort()) {
    html += `<div class="group-heading">${esc(group)}</div>`;
    for (const item of items) {
      html += renderCard(item);
    }
  }
  list.innerHTML = html;
}

function renderCard(item) {
  const ago = timeAgo(item.updatedAt);
  const previewUrl = item.targetUrl.match(/\.(jpg|jpeg|png|avif|webp|gif)/i)
    ? item.targetUrl + (item.targetUrl.includes('?') ? '&' : '?') + 'w=240&h=136&fit=crop'
    : '';
  return `
    <div class="card" id="card-${item.id}">
      <div class="card-row">
        <div class="card-info">
          <div class="card-path">${esc(item.path)}</div>
          <div class="card-target">${esc(item.targetUrl)}</div>
          <div class="card-meta">${esc(item.description)} &middot; ${ago} by ${esc(item.updatedBy)}</div>
          ${previewUrl ? `<img class="card-preview" src="${esc(previewUrl)}" alt="preview" onerror="this.style.display='none'">` : ''}
        </div>
        <div class="card-actions">
          <button class="btn btn-sm btn-outline" onclick="showEditModal('${item.id}')">Edit</button>
          <button class="btn btn-sm btn-outline" onclick="toggleHistory('${item.id}')">History (${item.history.length})</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRedirect('${item.id}')">Delete</button>
        </div>
      </div>
      <div class="history hidden" id="history-${item.id}">
        <h4>Change History</h4>
        ${item.history.length ? item.history.map((h, i) => `
          <div class="history-item">
            <div>
              <div class="history-url">${esc(h.targetUrl)}</div>
              ${h.note ? `<div class="history-note">${esc(h.note)}</div>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="history-meta">${timeAgo(h.updatedAt)} by ${esc(h.updatedBy)}</span>
              <button class="btn btn-sm btn-green" onclick="rollback('${item.id}', ${i})">Rollback</button>
            </div>
          </div>
        `).join('') : '<div style="font-size:12px;color:#9ca3af">No previous versions.</div>'}
      </div>
    </div>`;
}

function toggleHistory(id) {
  const el = document.getElementById('history-' + id);
  el.classList.toggle('hidden');
}

function showCreateModal() {
  document.getElementById('modalContent').innerHTML = `
    <h2>New Redirect</h2>
    <form onsubmit="createRedirect(event)">
      <div class="form-group">
        <label>ID (slug)</label>
        <input name="id" required placeholder="e.g. parking-hero-wide">
      </div>
      <div class="form-group">
        <label>Path</label>
        <input name="path" required placeholder="e.g. /parking/hero-wide">
      </div>
      <div class="form-group">
        <label>Target URL</label>
        <input name="targetUrl" required placeholder="https://holidayextras.imgix.net/...">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input name="description" placeholder="Short description">
      </div>
      <div class="form-group">
        <label>Group</label>
        <input name="group" placeholder="e.g. parking-hero">
        <small>Redirects with the same group are displayed together.</small>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>`;
  document.getElementById('modal').classList.remove('hidden');
}

function showEditModal(id) {
  fetch(API + '/' + id, { headers: headers() }).then(r => r.json()).then(item => {
    document.getElementById('modalContent').innerHTML = `
      <h2>Edit: ${esc(item.path)}</h2>
      <form onsubmit="updateRedirect(event, '${id}')">
        <div class="form-group">
          <label>Target URL</label>
          <input name="targetUrl" required value="${esc(item.targetUrl)}">
        </div>
        <div class="form-group">
          <label>Description</label>
          <input name="description" value="${esc(item.description)}">
        </div>
        <div class="form-group">
          <label>Note (reason for change)</label>
          <textarea name="note" placeholder="e.g. Updated for summer campaign"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>`;
    document.getElementById('modal').classList.remove('hidden');
  });
}

async function createRedirect(e) {
  e.preventDefault();
  const f = new FormData(e.target);
  const body = { id: f.get('id'), path: f.get('path'), targetUrl: f.get('targetUrl'), description: f.get('description'), group: f.get('group'), user: getUser() };
  const res = await fetch(API, { method: 'POST', headers: headers(), body: JSON.stringify(body) });
  if (!res.ok) { const err = await res.json(); alert(err.error); return; }
  closeModal();
  toast('Redirect created');
  load();
}

async function updateRedirect(e, id) {
  e.preventDefault();
  const f = new FormData(e.target);
  const body = { targetUrl: f.get('targetUrl'), description: f.get('description'), note: f.get('note'), user: getUser() };
  const res = await fetch(API + '/' + id, { method: 'PUT', headers: headers(), body: JSON.stringify(body) });
  if (!res.ok) { const err = await res.json(); alert(err.error); return; }
  closeModal();
  toast('Redirect updated');
  load();
}

async function rollback(id, index) {
  if (!confirm('Roll back to this version?')) return;
  const res = await fetch(API + '/' + id + '/rollback/' + index, {
    method: 'POST', headers: headers(), body: JSON.stringify({ user: getUser() })
  });
  if (!res.ok) { alert('Rollback failed'); return; }
  toast('Rolled back');
  load();
}

async function deleteRedirect(id) {
  if (!confirm('Delete this redirect? This cannot be undone.')) return;
  await fetch(API + '/' + id, { method: 'DELETE', headers: headers() });
  toast('Deleted');
  load();
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function timeAgo(iso) {
  if (!iso) return 'never';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

load();
</script>
</body>
</html>
